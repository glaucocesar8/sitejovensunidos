<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #0b1d3a, #112b52); color: white;">

<div class="container min-vh-100 d-flex justify-content-center align-items-md-center pt-5 px-3">

  <form id="formLogin" class="card shadow p-4 w-100 text-dark" style="max-width: 420px;" novalidate>

    <h3 class="text-center mb-4">Login</h3>

    <!-- ALERTA -->
    <div id="alerta" class="alert d-none"></div>

    <div class="mb-3">
      <input id="email" type="email" class="form-control form-control-lg" placeholder="Email" required>
      <div class="invalid-feedback">Informe um email válido</div>
    </div>

    <div class="mb-3">
      <input id="senha" type="password" class="form-control form-control-lg" placeholder="Senha" required>
      <div class="invalid-feedback">Informe a senha</div>
    </div>

    <button id="btnLogin" type="submit" class="btn btn-primary btn-lg w-100">
      Entrar
    </button>

  </form>

</div>

<script>

document.addEventListener('DOMContentLoaded', () => {

  const form = document.getElementById('formLogin');
  const btn = document.getElementById('btnLogin');
  const alerta = document.getElementById('alerta');

  // 🔐 já está logado? redireciona
  if (localStorage.getItem('token')) {
    window.location.href = 'admin.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // validação bootstrap
    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      return;
    }

    // loading
    btn.disabled = true;
    btn.innerHTML = 'Entrando...';

    try {
      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          senha: document.getElementById('senha').value
        })
      });

      const data = await res.json();

      if (!res.ok) {
        mostrarAlerta(data.error || 'Erro no login', 'danger');
        resetBotao();
        return;
      }

      // sucesso
      localStorage.setItem('token', data.token);

      mostrarAlerta('Login realizado com sucesso!', 'success');

      setTimeout(() => {
        window.location.href = 'admin.html';
      }, 800);

    } catch (err) {
      mostrarAlerta('Servidor indisponível', 'danger');
      resetBotao();
    }
  });

  function mostrarAlerta(msg, tipo) {
    alerta.className = `alert alert-${tipo}`;
    alerta.innerText = msg;
    alerta.classList.remove('d-none');
  }

  function resetBotao() {
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  }

});
</script>
