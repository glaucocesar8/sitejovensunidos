<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body style="background-color:#0b1d3a;">

<div class="container min-vh-100 d-flex justify-content-center align-items-md-center pt-5 px-3">

  <form class="card shadow p-4 w-100" style="max-width: 420px;">

    <h3 class="text-center mb-4">Login</h3>

    <input type="email" class="form-control form-control-lg mb-3" placeholder="Email">

    <input type="password" class="form-control form-control-lg mb-3" placeholder="Senha">

    <button class="btn btn-primary btn-lg w-100">
      Entrar
    </button>

  </form>

</div>

<script>
const form = document.getElementById('formLogin');
const btn = document.getElementById('btnLogin');
const alerta = document.getElementById('alerta');

document.getElementById('email').addEventListener('input', function () {
  this.classList.toggle('is-valid', this.checkValidity());
  this.classList.toggle('is-invalid', !this.checkValidity());
});

form.addEventListener('submit', async function (e) {
  e.preventDefault();

  // validação bootstrap
  if (!form.checkValidity()) {
    form.classList.add('was-validated');
    return;
  }

  // loading
  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try {
    const res = await fetch(`${API_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value
      })
    });

    const data = await res.json();

    // ERRO LOGIN
    if (!res.ok) {
      mostrarAlerta(data.error || 'Erro no login', 'danger');
      resetBotao();
      return;
    }

    // SUCESSO
    localStorage.setItem('token', data.token);

    mostrarAlerta('Login realizado com sucesso!', 'success');

    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 1000);

  } catch (err) {
    mostrarAlerta('Erro ao conectar com servidor', 'danger');
    resetBotao();
  }
});

// ALERTA BONITO
function mostrarAlerta(msg, tipo) {
  alerta.className = `alert alert-${tipo}`;
  alerta.innerText = msg;
  alerta.classList.remove('d-none');
}

// RESET BOTÃO
function resetBotao() {
  btn.disabled = false;
  btn.innerText = 'Entrar';
}
</script>
