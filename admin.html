<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin - Jogos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

  <div class="d-flex justify-content-between mb-4">
    <h2>Painel Admin</h2>
    <button class="btn btn-danger" onclick="logout()">Sair</button>
  </div>

  <!-- FORM -->
  <div class="card p-3 text-dark mb-4">
    <h5>Cadastrar / Editar Jogo</h5>

    <input id="idJogo" type="hidden">

    <div class="row g-2">
      <div class="col-md-6">
        <input id="timeCasa" class="form-control" placeholder="Time Casa">
      </div>

      <div class="col-md-6">
        <input id="timeFora" class="form-control" placeholder="Time Fora">
      </div>

      <div class="col-md-6">
        <input id="data" type="datetime-local" class="form-control">
      </div>

      <div class="col-md-6">
        <input id="local" class="form-control" placeholder="Local">
      </div>
    </div>

    <button class="btn btn-primary mt-3 w-100" onclick="salvarJogo()">
      Salvar
    </button>
  </div>

  <!-- LISTA -->
  <div id="listaJogos" class="row g-3"></div>

</div>

<script>
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3000'
  : 'https://sitejovensunidos-production.up.railway.app';

const token = localStorage.getItem('token');

// 🔐 proteção
if (!token) window.location.href = 'login.html';

// 📥 carregar jogos
async function carregarJogos() {
  const res = await fetch(`${API_URL}/jogos`);
  const jogos = await res.json();

  const container = document.getElementById('listaJogos');
  container.innerHTML = '';

  jogos.forEach(j => {
    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3 text-dark">

          <h6>${j.time_casa} x ${j.time_fora}</h6>
          <small>${j.local}</small>

          <div class="mt-2 d-flex gap-2">
            <button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(j)})'>Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deletar(${j.id})">Excluir</button>
          </div>

        </div>
      </div>
    `;
  });
}

// 💾 salvar (create + update)
async function salvarJogo() {
  const id = document.getElementById('idJogo').value;

  const dados = {
    time_casa: document.getElementById('timeCasa').value,
    time_fora: document.getElementById('timeFora').value,
    data_jogo: document.getElementById('data').value,
    local: document.getElementById('local').value
  };

  const url = id
    ? `${API_URL}/jogos/${id}`
    : `${API_URL}/jogos`;

  const metodo = id ? 'PUT' : 'POST';

  await fetch(url, {
    method: metodo,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': token
    },
    body: JSON.stringify(dados)
  });

  limparForm();
  carregarJogos();
}

// ✏️ editar
function editar(jogo) {
  document.getElementById('idJogo').value = jogo.id;
  document.getElementById('timeCasa').value = jogo.time_casa;
  document.getElementById('timeFora').value = jogo.time_fora;
  document.getElementById('data').value = jogo.data_jogo?.slice(0,16);
  document.getElementById('local').value = jogo.local;
}

// 🗑 deletar
async function deletar(id) {
  if (!confirm('Deseja excluir?')) return;

  await fetch(`${API_URL}/jogos/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': token }
  });

  carregarJogos();
}

// 🧹 limpar
function limparForm() {
  document.getElementById('idJogo').value = '';
  document.getElementById('timeCasa').value = '';
  document.getElementById('timeFora').value = '';
  document.getElementById('data').value = '';
  document.getElementById('local').value = '';
}

// 🚪 logout
function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

// init
carregarJogos();
</script>
