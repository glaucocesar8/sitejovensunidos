<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin - Jogos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/teste2.css">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

  <div class="d-flex justify-content-between mb-4">
    <h2>Painel Admin</h2>
    <button class="btn btn-danger" onclick="logout()">Sair</button>
  </div>

  <!-- FORM -->
  <div class="card p-3 text-dark mb-4">
    <h5>Cadastrar / Editar Jogo</h5>

    <input id="idJogo" type="hidden">

    <div class="row g-2">
      <!-- TIME CASA -->
      <div class="col-md-6 position-relative">
        <input id="timeCasa" class="form-control" placeholder="Buscar Time Casa">
        <div id="listaCasa" class="list-group position-absolute w-100"></div>
      </div>

      <!-- TIME FORA -->
      <div class="col-md-6 position-relative">
        <input id="timeFora" class="form-control" placeholder="Buscar Time Fora">
        <div id="listaFora" class="list-group position-absolute w-100"></div>
      </div>

      <div class="col-md-6">
        <input id="data" type="datetime-local" class="form-control">
      </div>

      <div class="col-md-6">
        <input id="local" class="form-control" placeholder="Local">
      </div>
    </div>

    <button class="btn btn-primary mt-3 w-100" onclick="salvarJogo()">
      Salvar
    </button>
  </div>

  <!-- LISTA -->
  <div id="listaJogos" class="row g-3"></div>

</div>

<script>
const API_URL = (
  window.location.hostname === 'localhost' ||
  window.location.hostname === '127.0.0.1'
)
  ? 'http://localhost:3000'
  : 'https://sitejovensunidos-production.up.railway.app';

const token = localStorage.getItem('token');

// 🔐 proteção
if (!token) window.location.href = 'login.html';

// 📥 carregar jogos
async function carregarJogos() {
  const res = await fetch(`${API_URL}/jogos`);
  const jogos = await res.json();

  const container = document.getElementById('listaJogos');
  container.innerHTML = '';

  jogos.forEach(j => {
    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3 text-white" style="background:#0f2a52; border-radius:12px;">

          <div class="d-flex align-items-center justify-content-between">

            <!-- TIME CASA -->
            <div class="text-center" style="width:30%;">
              <img src="${j.logo_casa}" style="width:50px; height:50px; object-fit:contain;">
              <div style="font-size:12px;">${j.time_casa}</div>
            </div>

            <!-- PLACAR -->
            <div class="text-center">
              <div style="font-size:22px; font-weight:bold;">
                ${j.gols_casa ?? '-'} x ${j.gols_fora ?? '-'}
              </div>
            </div>

            <!-- TIME FORA -->
            <div class="text-center" style="width:30%;">
              <img src="${j.logo_fora || 'https://cdn-icons-png.flaticon.com/512/53/53283.png'}"
  style="width:50px; height:50px; object-fit:contain;"
  onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'" style="width:50px; height:50px; object-fit:contain;">
              <div style="font-size:12px;">${j.time_fora}</div>
            </div>

          </div>

          <!-- INFO -->
          <div class="text-center mt-2" style="font-size:12px;">
            📍 ${j.local}<br>
            📅 ${formatarData(j.data_jogo)}
          </div>

          <!-- BOTÕES -->
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-warning btn-sm w-100" onclick='editar(${JSON.stringify(j)})'>Editar</button>
            <button class="btn btn-danger btn-sm w-100" onclick="deletar(${j.id})">Excluir</button>
          </div>

        </div>
      </div>
    `;
  });
}

// 💾 salvar
async function salvarJogo() {
  
  console.log('CASA:', timeCasaId);
  console.log('FORA:', timeForaId);

  if (!timeCasaId || !timeForaId) {
    alert('Selecione os times na lista');
    return;
  }

  const dados = {
    time_casa_id: timeCasaId,
    time_fora_id: timeForaId,
    data_jogo: document.getElementById('data').value,
    local: document.getElementById('local').value,
    status: 'agendado',
    gols_casa: 0,
    gols_fora: 0
  };

  console.log('ENVIANDO:', dados);

  const res = await fetch(`${API_URL}/jogos`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': localStorage.getItem('token')
    },
    body: JSON.stringify(dados)
  });

  if (res.status === 401) {
    alert('Sessão expirada. Faça login novamente.');
    localStorage.removeItem('token');
    window.location.href = 'login.html';
    return;
  }

  const data = await res.json();

  console.log('RESPOSTA:', data);

  if (!res.ok) {
    alert(data.error || 'Erro ao salvar');
    return;
  }

  alert('Jogo criado com sucesso!');
  carregarJogos();
}

// ✏️ editar
function editar(jogo) {
  document.getElementById('idJogo').value = jogo.id;
  document.getElementById('timeCasa').value = jogo.time_casa_id;
  document.getElementById('timeFora').value = jogo.time_fora_id;
  document.getElementById('data').value = jogo.data_jogo?.slice(0,16);
  document.getElementById('local').value = jogo.local;
}

// 🗑 deletar
async function deletar(id) {
  if (!confirm('Deseja excluir?')) return;

  await fetch(`${API_URL}/jogos/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': token }
  });

  carregarJogos();
}

// 🧹 limpar
function limparForm() {
  document.getElementById('idJogo').value = '';
  document.getElementById('timeCasa').value = '';
  document.getElementById('timeFora').value = '';
  document.getElementById('data').value = '';
  document.getElementById('local').value = '';
}

// 🚪 logout
function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

// 📅 formatar data
function formatarData(data) {
  return new Date(data).toLocaleString('pt-BR');
}

// init
carregarJogos();

let timeCasaId = null;
let timeForaId = null;

// 🔍 buscar times
async function buscarTimes(input, listaId, callback) {
  const nome = input.value;

  if (nome.length < 2) return;

  const res = await fetch(`${API_URL}/times?nome=${nome}`);
  const times = await res.json();

  const lista = document.getElementById(listaId);
  lista.innerHTML = '';

  times.forEach(t => {
    const item = document.createElement('button');

    item.className = 'list-group-item list-group-item-action d-flex align-items-center gap-2';

    item.innerHTML = `
      <img src="${t.logo}" 
           style="width:30px; height:30px; object-fit:contain;">
      <span>${t.nome}</span>
    `;

    item.onclick = () => {
      input.value = t.nome;
      lista.innerHTML = '';
      callback(t.id);
    };

    lista.appendChild(item);
  });
}

// EVENTOS
document.getElementById('timeCasa').addEventListener('input', function() {
  buscarTimes(this, 'listaCasa', (id) => timeCasaId = id);
});

document.getElementById('timeFora').addEventListener('input', function() {
  buscarTimes(this, 'listaFora', (id) => timeForaId = id);
});

window.addEventListener('beforeunload', () => {
  localStorage.removeItem('token');
});

</script>
